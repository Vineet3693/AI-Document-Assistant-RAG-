version: '3.8'

services:
  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - DATABASE_URL=sqlite:///data/documind.db
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs

  frontend:
    build: .
    ports:
      - "8501:8501"
    depends_on:
      - api
